<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CapShop POS</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-background": "#191c1d",
            "primary-fixed-dim": "#68dbae",
            "outline": "#6d7a73",
            "primary-fixed": "#86f8c9",
            "on-error": "#ffffff",
            "surface-container": "#edeeef",
            "on-primary-fixed": "#002115",
            "secondary-fixed-dim": "#c0c6db",
            "on-secondary-fixed": "#141b2b",
            "on-error-container": "#93000a",
            "on-surface": "#191c1d",
            "secondary-fixed": "#dce2f7",
            "surface-container-low": "#f3f4f5",
            "surface-container-highest": "#e1e3e4",
            "inverse-on-surface": "#f0f1f2",
            "outline-variant": "#bccac1",
            "error-container": "#ffdad6",
            "on-tertiary": "#ffffff",
            "tertiary-fixed-dim": "#ffb3ad",
            "surface-container-high": "#e7e8e9",
            "on-secondary-fixed-variant": "#404758",
            "inverse-primary": "#68dbae",
            "tertiary-fixed": "#ffdad6",
            "surface-dim": "#d9dadb",
            "on-secondary": "#ffffff",
            "on-surface-variant": "#3d4943",
            "surface-tint": "#006c4e",
            "tertiary-container": "#b85751",
            "surface-variant": "#e1e3e4",
            "surface": "#f8f9fa",
            "background": "#f8f9fa",
            "on-secondary-container": "#5c6274",
            "primary": "#00694c",
            "error": "#ba1a1a",
            "on-primary-fixed-variant": "#00513a",
            "primary-container": "#008560",
            "on-primary": "#ffffff",
            "secondary-container": "#d9dff5",
            "secondary": "#575e70",
            "on-tertiary-container": "#fffbff",
            "on-tertiary-fixed": "#410003",
            "on-primary-container": "#f5fff7",
            "surface-container-lowest": "#ffffff",
            "inverse-surface": "#2e3132",
            "tertiary": "#993f3a",
            "on-tertiary-fixed-variant": "#7e2a27",
            "surface-bright": "#f8f9fa"
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "8px",
            xl: "12px",
            full: "9999px"
          },
          spacing: {
            xl: "32px",
            "container-padding": "20px",
            unit: "4px",
            lg: "24px",
            xs: "4px",
            sm: "8px",
            md: "16px",
            gutter: "12px"
          },
          fontFamily: {
            "label-sm": ["Inter"],
            h1: ["Inter"],
            h2: ["Inter"],
            "body-m": ["Inter"],
            "code-num": ["Inter"],
            "body-m-bold": ["Inter"],
            "display-price": ["Inter"]
          },
          fontSize: {
            "label-sm": ["12px", { lineHeight: "16px", fontWeight: "500" }],
            h1: ["24px", { lineHeight: "32px", fontWeight: "600" }],
            h2: ["18px", { lineHeight: "24px", fontWeight: "600" }],
            "body-m": ["14px", { lineHeight: "20px", fontWeight: "400" }],
            "code-num": ["14px", { lineHeight: "20px", fontWeight: "500" }],
            "body-m-bold": ["14px", { lineHeight: "20px", fontWeight: "500" }],
            "display-price": ["32px", { lineHeight: "40px", letterSpacing: "-0.02em", fontWeight: "600" }]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #bccac1; border-radius: 10px; }
    .product-card-hover:hover .hover-overlay { opacity: 1; }
  </style>
</head>
<body class="bg-background text-on-surface h-screen overflow-hidden flex flex-col">
  <!-- TopAppBar Shell -->
  <header class="flex justify-between items-center px-5 h-16 w-full bg-white dark:bg-slate-900 border-b border-gray-200 dark:border-gray-800 z-50">
    <div class="flex items-center gap-2 text-xl font-bold text-[#1D9E75] dark:text-[#22c55e]">
      <div class="w-8 h-8 bg-[#1D9E75] rounded-lg flex items-center justify-center text-white">
        <span class="material-symbols-outlined text-sm">shopping_bag</span>
      </div>
      <span class="font-h1 text-h1 tracking-tight">CapShop POS</span>
    </div>
    <div class="flex items-center gap-6">
      <span class="font-body-m text-body-m text-gray-500" id="fecha">Hoy: 24 May, 2024</span>
      <div class="flex items-center gap-3">
        <button class="p-2 rounded-lg hover:bg-gray-50 transition-colors cursor-pointer active:opacity-80">
          <span class="material-symbols-outlined text-gray-500">notifications</span>
        </button>
        <button class="p-2 rounded-lg hover:bg-gray-50 transition-colors cursor-pointer active:opacity-80">
          <span class="material-symbols-outlined text-gray-500">settings</span>
        </button>
      </div>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Main Catalog Area -->
    <main class="flex-1 flex flex-col min-w-0 bg-surface-container-low">
      <!-- Toolbar -->
      <div class="p-5 flex flex-col gap-4">
        <div class="flex items-center justify-between gap-4">
          <div class="relative flex-1 max-w-md">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
            <input id="search" class="w-full pl-10 pr-4 py-2 bg-white border border-outline-variant rounded-lg font-body-m text-body-m focus:outline-none focus:border-primary-container transition-all" placeholder="Buscar por nombre o ID" type="text">
          </div>
          <div class="flex gap-2">
            <button class="px-4 py-2 rounded-lg bg-[#1D9E75] text-white font-body-m-bold text-body-m border border-[#1D9E75]" data-filter="todos">Todos</button>
            <button class="px-4 py-2 rounded-lg bg-white text-on-surface font-body-m text-body-m border border-outline-variant hover:bg-gray-50 transition-all" data-filter="gorra">Gorras</button>
            <button class="px-4 py-2 rounded-lg bg-white text-on-surface font-body-m text-body-m border border-outline-variant hover:bg-gray-50 transition-all" data-filter="playera">Playeras</button>
          </div>
        </div>
      </div>

      <!-- Scrollable Catalog -->
      <div id="productos-container" class="flex-1 overflow-y-auto px-5 pb-20">
        <!-- Los productos se cargarán aquí dinámicamente -->
      </div>
    </main>

    <!-- Cart Sidebar -->
    <aside class="w-[400px] bg-white border-l border-outline-variant flex flex-col shadow-sm">
      <!-- Header -->
      <div class="p-5 flex items-center justify-between border-b border-gray-100">
        <div class="flex items-center gap-2">
          <h2 class="font-h1 text-h2">Venta actual</h2>
          <span class="px-2 py-0.5 bg-surface-container text-secondary font-label-sm text-label-sm rounded-full" id="carrito-count">0 ítems</span>
        </div>
        <button class="text-outline hover:text-error transition-colors" onclick="limpiarCarrito()">
          <span class="material-symbols-outlined">delete_sweep</span>
        </button>
      </div>

      <!-- Cart Items List -->
      <div id="carrito-items" class="flex-1 overflow-y-auto p-5 space-y-4">
        <!-- Los items del carrito se cargarán aquí -->
      </div>

      <!-- Cart Footer -->
      <div class="p-5 bg-surface border-t border-outline-variant">
        <div class="space-y-2 mb-4">
          <div class="flex justify-between text-body-m text-outline">
            <span>Subtotal</span>
            <span id="subtotal">$0.00</span>
          </div>
          <div class="flex justify-between text-body-m text-outline">
            <span>Descuento</span>
            <span id="descuento">-$0.00</span>
          </div>
          <div class="h-[0.5px] bg-outline-variant w-full my-2"></div>
          <div class="flex justify-between items-baseline">
            <span class="font-h1 text-h2">Total</span>
            <span class="font-display-price text-display-price text-[#1D9E75]" id="total">$0.00</span>
          </div>
        </div>

        <!-- Payment Methods -->
        <div class="grid grid-cols-3 gap-2 mb-4">
          <button class="flex flex-col items-center gap-1 p-2 rounded-lg border-2 border-[#1D9E75] bg-[#E8F5F1] text-[#1D9E75] transition-all" data-metodo="efectivo" onclick="seleccionarMetodo('efectivo', this)">
            <span class="material-symbols-outlined text-sm">payments</span>
            <span class="text-[10px] font-bold uppercase">Efectivo</span>
          </button>
          <button class="flex flex-col items-center gap-1 p-2 rounded-lg border border-outline-variant hover:bg-gray-50 transition-all text-outline" data-metodo="tarjeta" onclick="seleccionarMetodo('tarjeta', this)">
            <span class="material-symbols-outlined text-sm">credit_card</span>
            <span class="text-[10px] font-bold uppercase">Tarjeta</span>
          </button>
          <button class="flex flex-col items-center gap-1 p-2 rounded-lg border border-outline-variant hover:bg-gray-50 transition-all text-outline" data-metodo="transferencia" onclick="seleccionarMetodo('transferencia', this)">
            <span class="material-symbols-outlined text-sm">account_balance</span>
            <span class="text-[10px] font-bold uppercase">Transf.</span>
          </button>
        </div>

        <!-- Action Button -->
        <button id="btn-cobrar" class="w-full h-14 bg-[#1D9E75] hover:bg-[#167e5d] text-white font-h1 text-h2 rounded-xl transition-all active:scale-[0.98] flex items-center justify-center gap-2" onclick="cobrar()">
          Cobrar $0.00
        </button>
      </div>
    </aside>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
